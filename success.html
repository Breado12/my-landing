<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 처리 중 · 브레도</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="result">
    <div class="emoji" id="emoji">⏳</div>
    <h1 id="title">결제 승인 중…</h1>
    <p id="detail">잠시만 기다려 주세요.</p>
    <a class="btn ghost" href="index.html">스토어로 돌아가기</a>
  </div>

  <script type="module">
    import { CONFIRM_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    const emoji = document.getElementById("emoji");
    const title = document.getElementById("title");
    const detail = document.getElementById("detail");

    const p = new URLSearchParams(location.search);
    const paymentKey = p.get("paymentKey");
    const orderId = p.get("orderId");
    const amount = p.get("amount");

    async function confirm() {
      try {
        const res = await fetch(CONFIRM_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ paymentKey, orderId, amount }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          emoji.textContent = "✅";
          title.textContent = "결제가 완료되었습니다";
          detail.textContent = `주문번호 ${orderId}`;
        } else {
          emoji.textContent = "⚠️";
          title.textContent = "결제 승인 실패";
          detail.textContent = data.error || "알 수 없는 오류";
        }
      } catch (e) {
        emoji.textContent = "⚠️";
        title.textContent = "결제 승인 실패";
        detail.textContent = String(e);
      }
    }

    confirm();
  </script>
</body>
</html>
